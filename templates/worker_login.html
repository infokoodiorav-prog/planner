<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Töölise tööpäeva plaanerija</title>
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='index.css') }}"
    />
  </head>
  <body>
       <div class="container">
      <form class="card">
        <div class="header">
          <div class="icon">
            <div class="icon-inner">
           <img src="/static/img/orav.png" alt="Logo"
           width="70px" height="70px">
            </div>
          </div>
          <h2>Tere tulemast</h2>
          <p>Jätkamiseks palun sisse logida</p>
        </div>

        <div class="login">
          <div class="login-input">
            <input type="text" id="email" placeholder="E-mail" />
            <label for="email">E-mail</label>
            <div class="input-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </div>
          </div>
        </div>

        <div class="login">
          <div class="login-input">
            <input type="password" id="password" placeholder="Parool" />
            <label for="password">Parool</label>
            <div class="input-icon">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0110 0v4" />
              </svg>
            </div>
            
          </div>
          <p id="response" class="error-message"></p>
        </div>

        <div class="form">
          <div class="remember-wrapper">
            <input type="checkbox" id="remember" name="remember" />
            <label for="remember" class="checkbox-label">
              <div class="neu-checkbox">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="3"
                >
                  <polyline points="20 6 9 17 4 12" />
                </svg>
              </div>
              Jäta mind meelde
            </label>
          </div>
          <div class="forgot">
          <p>
            <a href="/reset" class="forgot-link">Unustasid parooli?</a>
          </p>
          </div>
        </div>

        <button type="button" id="loginBtn" onclick="login()" class="neu-button login-btn">
         <span class="btn-text">Logi sisse</span>
            <div class="btn-loader">
              <div class="neu-spinner"></div>
            </div>
        </button>

        <button class="neu-button login-btn" type="button" id="workerLoginBtn" onclick="window.location.href='/'" class="btn-primary">
          <span class="btn-text">Admin sisse logimine</span>
            <div class="btn-loader">
              <div class="neu-spinner"></div>
            </div>
            </button>
      
        <div class="divider">
          <div class="divider-line"></div>
          <span>või kasuta sisselogimiseks</span>
          <div class="divider-line"></div>
        </div>

        <div class="social-login">
          <button type="button" class="social-btn neu-social">
    <svg viewBox="0 0 24 24" fill="currentColor">
    <path d="M22.018 13.298l-3.919 2.218-3.515-3.493 3.543-3.521 3.891 2.202a1.49 1.49 0 0 1 0 2.594zM1.337.924a1.486 1.486 0 0 0-.112.568v21.017c0 .217.045.419.124.6l11.155-11.087L1.337.924zm12.207 10.065l3.258-3.238L3.45.195a1.466 1.466 0 0 0-.946-.179l11.04 10.973zm0 2.067l-11 10.933c.298.036.612-.016.906-.183l13.324-7.54-3.23-3.21z"/>
            </svg>
          </button>
          <button type="button" class="social-btn neu-social">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .307 5.387.307 12s5.56 12 12.173 12c3.573 0 6.267-1.173 8.373-3.36 2.16-2.16 2.84-5.213 2.84-7.667 0-.76-.053-1.467-.173-2.053H12.48z"/>
            </svg>
          </button>
          <button type="button" class="social-btn neu-social">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M9.101 23.691v-7.98H6.627v-3.667h2.474v-1.58c0-4.085 1.848-5.978 5.858-5.978.401 0 .955.042 1.468.103a8.68 8.68 0 0 1 1.141.195v3.325a8.623 8.623 0 0 0-.653-.036 26.805 26.805 0 0 0-.733-.009c-.707 0-1.259.096-1.675.309a1.686 1.686 0 0 0-.679.622c-.258.42-.374.995-.374 1.752v1.297h3.919l-.386 2.103-.287 1.564h-3.246v8.245C19.396 23.238 24 18.179 24 12.044c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.628 3.874 10.35 9.101 11.647Z"/>
            </svg>
          </button>
        </div>

        <div class="signup-link">
          <p>Pole veel kontot? <a href="/register_page" class="forgot-link">Registreeru</a></p>
        </div>
        
      </div>
    </div>

    <script src="{{ url_for('static', filename='worker.js') }}"></script>
  </body>
</html>
